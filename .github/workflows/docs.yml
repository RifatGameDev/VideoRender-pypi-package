name: Deploy Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write   # 🔥 THIS IS THE KEY FIX

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - run: pip install mkdocs-material

      - run: mkdocs gh-deploy --force












